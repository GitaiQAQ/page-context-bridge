<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Context Bridge</title>
    <style>
      body {
        width: 320px;
      }
    </style>
  </head>
  <body class="bg-base-200 text-base-content text-xs p-2">
    <section class="rounded-md border border-base-300 bg-base-100 shadow-sm overflow-hidden">
      <div class="flex items-start justify-between gap-3 border-b border-base-300 px-3 py-2">
        <div class="min-w-0">
          <div class="flex items-center gap-2">
            <span class="w-2 h-2 rounded-full shrink-0 bg-error" id="statusDot"></span>
            <span class="font-bold text-sm flex-1 truncate" id="appTitle">Page Context Bridge</span>
          </div>
          <div class="mt-0.5 text-[11px] opacity-60" id="popupSubtitle">
            Browser bridge quick controls
          </div>
        </div>
        <button class="btn btn-xs btn-ghost" id="reconnectBtn">Reconnect</button>
      </div>

      <div class="grid grid-cols-2 divide-x divide-base-300 border-b border-base-300">
        <div class="px-3 py-2">
          <div id="statusLabel" class="text-[10px] font-bold uppercase tracking-wide opacity-45">
            Status
          </div>
          <div class="mt-1 text-sm font-semibold truncate" id="statusText">Disconnected</div>
        </div>
        <div class="px-3 py-2">
          <div
            id="pendingCallsLabel"
            class="text-[10px] font-bold uppercase tracking-wide opacity-45"
          >
            Pending Tool Calls
          </div>
          <div class="mt-1 text-sm font-semibold tabular-nums" id="pendingCalls">0</div>
        </div>
      </div>

      <div class="flex items-center gap-2 border-b border-base-300 px-3 py-2">
        <label
          id="languageLabel"
          for="localeSelect"
          class="text-[10px] font-bold uppercase tracking-wide opacity-45"
          >Language</label
        >
        <select class="select select-xs select-bordered min-h-7 flex-1" id="localeSelect">
          <option value="auto">Browser default</option>
          <option value="en">English</option>
          <option value="zh-CN">简体中文</option>
          <option value="ja">日本語</option>
        </select>
      </div>

      <div class="grid grid-cols-2 gap-1.5 p-2">
        <button class="btn btn-sm btn-primary" id="openSidePanelBtn">Workspace</button>
        <button class="btn btn-sm btn-ghost" id="openSetupBtn">Setup</button>
        <button class="btn btn-sm btn-ghost" id="openExampleBtn">Context Test Page</button>
      </div>
    </section>

    <!-- Toast -->
    <div class="mt-2 hidden" id="toast"></div>

    <script type="module" src="./src/popup-main.ts"></script>
  </body>
</html>
