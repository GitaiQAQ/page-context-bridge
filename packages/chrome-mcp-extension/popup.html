<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Context Bridge</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      background: #fff;
      padding: 16px;
    }
    h1 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
      flex-shrink: 0;
    }
    .status-dot.connected { background: #22c55e; }
    .status-dot.disconnected { background: #ef4444; }
    .field { margin-bottom: 10px; }
    .field label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      color: #666;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .field .value {
      font-size: 13px;
      color: #1a1a1a;
      word-break: break-all;
    }
    input[type="text"] {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 13px;
      font-family: monospace;
      outline: none;
    }
    input[type="text"]:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.15);
    }
    .actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }
    button {
      flex: 1;
      padding: 7px 12px;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
    }
    button.primary {
      background: #3b82f6;
      color: #fff;
    }
    button.primary:hover { background: #2563eb; }
    button.secondary {
      background: #f3f4f6;
      color: #374151;
    }
    button.secondary:hover { background: #e5e7eb; }
    .toast {
      margin-top: 8px;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 12px;
      display: none;
    }
    .toast.success { background: #dcfce7; color: #166534; }
    .toast.error { background: #fee2e2; color: #991b1b; }
  </style>
</head>
<body>
  <h1>
    <span class="status-dot disconnected" id="statusDot"></span>
    Page Context Bridge
  </h1>

  <div class="field">
    <label>Status</label>
    <div class="value" id="statusText">Disconnected</div>
  </div>

  <div class="field">
    <label>WebSocket URL</label>
    <input type="text" id="wsUrlInput" placeholder="ws://127.0.0.1:9001" />
  </div>

  <div class="field">
    <label>Pending Tool Calls</label>
    <div class="value" id="pendingCalls">0</div>
  </div>

  <div class="actions">
    <button class="primary" id="saveBtn">Save &amp; Reconnect</button>
    <button class="secondary" id="reconnectBtn">Reconnect</button>
  </div>

  <div class="actions" style="margin-top:8px">
    <button class="secondary" id="openExampleBtn" style="flex:1">Open Context Test Page</button>
    <button class="secondary" id="openSidePanelBtn" style="flex:1">Side Panel</button>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module" src="./src/popup-main.ts"></script>
</body>
</html>
